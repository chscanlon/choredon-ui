<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Graphium choredon, the Blue Triangle butterfly">
  <title>Graphium choredon</title>
  <desc>A stylised Blue Triangle butterfly. Forewings with slightly hooked outer tips, hindwings with gently scalloped lower edges. Wing borders, body, head, and antennae are drawn as outlines using currentColor so the graphic adapts to the parent's text colour — Vellum on Wingbase (primary), or Ink on Vellum (fallback). Twelve inverted cerulean triangles on the forewings, eight on the hindwings, with two small inverted Underspot-red accents on the hindwings.</desc>

