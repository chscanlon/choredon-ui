    <polygon points="110,120 124,120 117,138"/>
    <polygon points="94,122 106,122 100,136"/>
  </g>

  <g fill="#1E8FB8">
    <polygon points="166,118 174,118 170,140"/>
    <polygon points="178,118 192,118 185,139"/>
