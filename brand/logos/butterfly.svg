<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Graphium choredon, the Blue Triangle butterfly">
  <title>Graphium choredon</title>
  <desc>A stylised Blue Triangle butterfly. Forewings with horizontal leading edges and blunt rounded tips. Narrower hindwings angled gently downward with generous rounded outer curves. Inverted cerulean triangle markings in a subtle size gradient, closely spaced near the body, clear of the thorax. Two small inverted Underspot-red accents. Structural lines use currentColor so the graphic adapts to the parent's text colour: set color to Vellum for Wingbase surfaces (the primary treatment), or to Ink for Vellum surfaces.</desc>

